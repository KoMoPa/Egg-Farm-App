<svg width="400" height="460" viewBox="0 0 680 780" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Cartoon brown egg</title>
  <desc>A cartoon-style brown egg with thick outline, bold shading, and chunky highlights</desc>
  <defs>
    <radialGradient id="bg2" cx="38%" cy="38%" r="62%">
      <stop offset="0%"   stop-color="#e8a96e"/>
      <stop offset="55%"  stop-color="#c97840"/>
      <stop offset="100%" stop-color="#a04e1a"/>
    </radialGradient>
    <radialGradient id="shd" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#333" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#333" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="ec">
      <path d="M340,80 C480,80 575,225 575,415 C575,585 468,710 340,710 C212,710 105,585 105,415 C105,225 200,80 340,80 Z"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <ellipse cx="358" cy="700" rx="185" ry="28" fill="url(#shd)"/>

  <!-- Dark outline offset for cartoon depth -->
  <path d="M340,80 C480,80 575,225 575,415 C575,585 468,710 340,710 C212,710 105,585 105,415 C105,225 200,80 340,80 Z"
        fill="#7a2e08" transform="translate(7,8)"/>

  <!-- Egg body -->
  <path d="M340,80 C480,80 575,225 575,415 C575,585 468,710 340,710 C212,710 105,585 105,415 C105,225 200,80 340,80 Z"
        fill="url(#bg2)"/>

  <!-- Dark side shading blob -->
  <ellipse cx="480" cy="460" rx="80" ry="130" fill="#a04e1a" opacity="0.45" clip-path="url(#ec)"/>

  <!-- Chunky highlight blob -->
  <path d="M230,160 C255,140 310,148 320,195 C330,242 295,295 258,288 C221,281 195,235 200,200 C205,165 230,160 230,160 Z"
        fill="#fff0dc" opacity="0.88" clip-path="url(#ec)"/>

  <!-- Small secondary highlight -->
  <ellipse cx="268" cy="310" rx="22" ry="14" fill="#fff0dc" opacity="0.50" clip-path="url(#ec)" transform="rotate(-20,268,310)"/>

  <!-- Thick cartoon outline -->
  <path d="M340,80 C480,80 575,225 575,415 C575,585 468,710 340,710 C212,710 105,585 105,415 C105,225 200,80 340,80 Z"
        fill="none" stroke="#7a2e08" stroke-width="14" stroke-linejoin="round"/>
</svg>
